<!DOCTYPE html>
<html>
<head>
  <title>Payment Success - The Creators Vault</title>
</head>
<body style="font-family:Arial;background:#090d16;color:white;display:flex;align-items:center;justify-content:center;height:100vh;">
  <div style="max-width:420px;background:#111827;padding:28px;border-radius:18px;text-align:center;">
    <h1>Verifying Payment...</h1>
    <p id="status">Please wait.</p>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq8m41bhoWk3cMEkqqUXvik_iZA6DDMHM",
  authDomain: "creators-vaults.firebaseapp.com",
  projectId: "creators-vaults",
  storageBucket: "creators-vaults.firebasestorage.app",
  messagingSenderId: "739165070040",
  appId: "1:739165070040:web:8d2e72b8f8fad441df2dad"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const statusEl = document.getElementById("status");
const orderId = new URLSearchParams(window.location.search).get("order_id") || localStorage.getItem("cv_last_order_id");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  if (!orderId) {
    statusEl.textContent = "Order ID missing.";
    return;
  }

  const res = await fetch("/api/verify-payment", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ order_id: orderId })
  });

  const data = await res.json();

  if (data.paid === true) {
    await updateDoc(doc(db, "users", user.uid), {
      paid: true,
      membershipName: "Vault Pro Lifetime",
      premiumActivationTimestamp: serverTimestamp(),
      cashfreeOrderId: orderId
    });

    statusEl.textContent = "Premium activated successfully!";
    setTimeout(() => window.location.href = "dashboard.html", 1500);
  } else {
    statusEl.textContent = "Payment not completed yet.";
  }
});
</script>
</body>
</html>
