<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - The Creators Vault</title>
  <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#090d16;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{width:90%;max-width:430px;background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    h1{margin:0 0 8px;font-size:28px}
    p{color:#94a3b8}
    .price{font-size:48px;font-weight:900;margin:20px 0}
    button,a{width:100%;padding:15px;border-radius:14px;border:0;font-weight:800;cursor:pointer;text-decoration:none;display:block;box-sizing:border-box}
    button{background:linear-gradient(90deg,#7c3aed,#2563eb);color:#fff}
    button:disabled{opacity:.6;cursor:not-allowed}
    a{background:#1f2937;color:#fff;margin-top:12px}
    #status{font-size:14px;margin-top:16px}
  </style>
</head>
<body>
  <div class="card">
    <h1>The Creators Vault</h1>
    <p>Lifetime Premium Access</p>
    <div class="price">₹1</div>
    <button id="payBtn">Pay ₹1</button>
    <a href="dashboard.html">Back to Dashboard</a>
    <p id="status">Secure checkout powered by Cashfree</p>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq8m41bhoWk3cMEkqqUXvik_iZA6DDMHM",
  authDomain: "creators-vaults.firebaseapp.com",
  projectId: "creators-vaults",
  storageBucket: "creators-vaults.firebasestorage.app",
  messagingSenderId: "739165070040",
  appId: "1:739165070040:web:8d2e72b8f8fad441df2dad",
  measurementId: "G-MM742MSP09"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;
const payBtn = document.getElementById("payBtn");
const statusEl = document.getElementById("status");

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }
  currentUser = user;
});

payBtn.addEventListener("click", async () => {
  if (!currentUser) return;

  payBtn.disabled = true;
  payBtn.textContent = "Creating Order...";
  statusEl.textContent = "Creating secure Cashfree order...";

  try {
    const response = await fetch("/api/create-order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        uid: currentUser.uid,
        email: currentUser.email,
        name: currentUser.displayName || currentUser.email || "Creator Vault User",
        phone: "9999999999"
      })
    });

    const data = await response.json();

    if (!response.ok || !data.payment_session_id || !data.order_id) {
      console.error("Create order failed:", data);
      alert(data.error || "Unable to create payment order");
      payBtn.disabled = false;
      payBtn.textContent = "Pay ₹1";
      statusEl.textContent = "Payment order failed.";
      return;
    }

    localStorage.setItem("cv_last_order_id", data.order_id);

    const cashfree = Cashfree({ mode: "production" });

    statusEl.textContent = "Opening Cashfree checkout...";

    await cashfree.checkout({
      paymentSessionId: data.payment_session_id,
      redirectTarget: "_modal"
    });

    window.location.href = `success.html?order_id=${encodeURIComponent(data.order_id)}`;

  } catch (err) {
    console.error(err);
    alert("Something went wrong while starting payment.");
    payBtn.disabled = false;
    payBtn.textContent = "Pay ₹1";
    statusEl.textContent = "Payment failed to start.";
  }
});
</script>
</body>
</html>
