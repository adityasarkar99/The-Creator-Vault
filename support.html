<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Center | The Creators Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root {
            --bg-main: #090d16; --bg-card: rgba(17, 24, 39, 0.7); --bg-card-solid: #111827;
            --bg-input: #1f2937; --border-primary: rgba(255, 255, 255, 0.08); --text-main: #f8fafc;
            --text-muted: #94a3b8; --accent-brand: #3b82f6; --accent-brand-hover: #2563eb;
            --shadow-subtle: 0 4px 6px -1px rgba(0,0,0,0.1); --glass-blur: blur(12px);
        }
        [data-theme="light"] {
            --bg-main: #f3f4f6; --bg-card: rgba(255, 255, 255, 0.8); --bg-card-solid: #ffffff;
            --bg-input: #f9fafb; --border-primary: rgba(0, 0, 0, 0.1); --text-main: #111827;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg-main); color: var(--text-main); min-height: 100vh; }

        /* Loader & Layout */
        #loader { position: fixed; inset: 0; background: var(--bg-main); z-index: 9999; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .nav-header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-primary); position: sticky; top: 0; z-index: 100; backdrop-filter: var(--glass-blur); }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        /* Components */
        .glass-card { background: var(--bg-card); border: 1px solid var(--border-primary); border-radius: 16px; padding: 30px; backdrop-filter: var(--glass-blur); }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; color: white; background: var(--accent-brand); }
        .btn:hover { background: var(--accent-brand-hover); }

        /* Toast */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast { background: var(--bg-card-solid); padding: 15px 20px; border-radius: 8px; border-left: 4px solid var(--accent-brand); margin-bottom: 10px; box-shadow: var(--shadow-subtle); display: flex; align-items: center; justify-content: space-between; min-width: 300px; }

        /* Utilities */
        .hidden { display: none; }
        @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loader">Verifying Support Session...</div>

<header class="nav-header">
    <div style="font-size: 1.5rem; font-weight: 800; color: var(--accent-brand);">The Creators Vault</div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <button id="themeToggle" class="btn"><i class="fas fa-adjust"></i></button>
        <a href="dashboard.html" class="btn">Dashboard</a>
        <div id="profileAvatar" style="width: 40px; height: 40px; border-radius: 50%; background: var(--accent-brand); text-align: center; line-height: 40px; cursor: pointer;">U</div>
    </div>
</header>

<main class="container">
    <section class="hero" style="text-align: center; margin-bottom: 50px;">
        <h1>Need Help?</h1>
        <p style="color: var(--text-muted);">Get fast support for downloads, premium access, and account questions.</p>
    </section>

    <div class="glass-card" style="margin-bottom: 40px;">
        <form id="supportForm">
            <input type="text" id="name" placeholder="Full Name" required style="width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-input); border: 1px solid var(--border-primary); color: var(--text-main); border-radius: 8px;">
            <input type="email" id="email" placeholder="Email Address" required style="width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-input); border: 1px solid var(--border-primary); color: var(--text-main); border-radius: 8px;">
            <select id="issue" style="width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-input); border: 1px solid var(--border-primary); color: var(--text-main); border-radius: 8px;">
                <option>Payment Issue</option>
                <option>Premium Activation</option>
                <option>Download Not Working</option>
                <option>Broken Link</option>
                <option>Other</option>
            </select>
            <input type="text" id="subject" placeholder="Subject" required style="width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-input); border: 1px solid var(--border-primary); color: var(--text-main); border-radius: 8px;">
            <textarea id="message" rows="5" placeholder="Message" required style="width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-input); border: 1px solid var(--border-primary); color: var(--text-main); border-radius: 8px;"></textarea>
            <button type="submit" class="btn" style="width: 100%;">Submit Ticket</button>
        </form>
    </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDq8m41bhoWk3cMEkqqUXvik_iZA6DDMHM", authDomain: "creators-vaults.firebaseapp.com", projectId: "creators-vaults", storageBucket: "creators-vaults.firebasestorage.app", messagingSenderId: "739165070040", appId: "1:739165070040:web:8d2e72b8f8fad441df2dad", measurementId: "G-MM742MSP09" };
    firebase.initializeApp(firebaseConfig);

    firebase.auth().onAuthStateChanged((user) => {
        if (!user) window.location.href = 'index.html';
        else document.getElementById('loader').style.display = 'none';
    });

    // Theme Logic
    const toggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('cv_saved_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    toggle.onclick = () => {
        const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('cv_saved_theme', newTheme);
    };

    // Telegram Bot Integration
    const TELEGRAM_BOT_TOKEN = "PASTE_YOUR_BOT_TOKEN_HERE";
    const TELEGRAM_CHAT_ID = "PASTE_YOUR_CHAT_ID_HERE";

    document.getElementById('supportForm').onsubmit = async (e) => {
        e.preventDefault();
        const ticketId = "CV-" + Math.floor(100000 + Math.random() * 900000);
        const msg = `🚨 NEW SUPPORT REQUEST\n\n🎫 Ticket ID: ${ticketId}\n👤 Name: ${document.getElementById('name').value}\n📧 Email: ${document.getElementById('email').value}\n📌 Issue: ${document.getElementById('issue').value}\n🧾 Subject: ${document.getElementById('subject').value}\n💬 Message: ${document.getElementById('message').value}\n⏰ Time: ${new Date().toLocaleString()}`;
        
        try {
            await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg })
            });
            showToast("Support request sent successfully. Ticket: " + ticketId);
            document.getElementById('supportForm').reset();
        } catch { showToast("Unable to send request.", true); }
    };

    function showToast(text, isError = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = `<span>${text}</span><i class="fas fa-times" onclick="this.parentElement.remove()" style="cursor:pointer"></i>`;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => t.remove(), 4000);
    }

    // Security
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F12' || (e.ctrlKey && ['u', 's', 'i', 'j'].includes(e.key.toLowerCase()))) e.preventDefault();
    });
</script>
</body>
</html>
